name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-cli:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            name: mem-darwin-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            name: mem-darwin-x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: mem-linux-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build CLI
        run: cargo build --release --target ${{ matrix.target }} -p mem-cli
      - name: Rename binary
        run: |
          cp target/${{ matrix.target }}/release/mem ${{ matrix.name }}
          chmod +x ${{ matrix.name }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  build-desktop:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            name: desktop-darwin-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            name: desktop-darwin-x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: desktop-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: desktop-windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend deps
        working-directory: apps/desktop
        run: npm ci

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tauriScript: npx tauri
          args: --target ${{ matrix.target }}

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p dist
          if [ "$RUNNER_OS" == "macOS" ]; then
            cp apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg dist/ 2>/dev/null || true
          elif [ "$RUNNER_OS" == "Linux" ]; then
            cp apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage dist/ 2>/dev/null || true
            cp apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb dist/ 2>/dev/null || true
          elif [ "$RUNNER_OS" == "Windows" ]; then
            cp apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe dist/ 2>/dev/null || true
            cp apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi dist/ 2>/dev/null || true
          fi
          # Signature files skipped (updater not configured yet)

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/*

  create-release:
    needs: [build-cli, build-desktop]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | head -50

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
